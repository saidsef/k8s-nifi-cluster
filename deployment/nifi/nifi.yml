---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nifi
  labels:
    name: nifi
    app: nifi
  annotations:
    app.kubernetes.io/name: nifi
    app.kubernetes.io/part-of: nifi
spec:
  replicas: 2
  revisionHistoryLimit: 1
  serviceName: nifi
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: nifi
  template:
    metadata:
      labels:
        app: nifi
    spec:
      serviceAccountName: nifi
      automountServiceAccountToken: true
      enableServiceLinks: false
      setHostnameAsFQDN: true
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      securityContext:
        runAsGroup: 1000
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: fix-permissions
          image: docker.io/busybox:1.37
          command:
          - sh
          - -c
          - |
            chmod -R 777 /certs
            chown -R 1000:1000 /certs
          volumeMounts:
          - name: certs
            mountPath: /certs
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            privileged: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - FOWNER
        - name: security-setup
          image: docker.io/apache/nifi:2.9.0
          command:
          - /bin/bash
          - /scripts/security.sh
          env:
          - name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          volumeMounts:
          - name: certs
            mountPath: /certs
          - name: scripts
            mountPath: /scripts/security.sh
            subPath: security.sh
      containers:
      - name: nifi
        image: docker.io/apache/nifi:2.9.0
        imagePullPolicy: IfNotPresent
        command:
          - /bin/bash
          - -c
          - |
            # Point NiFi at certs mounted from the shared PVC (start.sh does not handle custom cert paths)
            sed -i 's|nifi.security.keystore=.*|nifi.security.keystore=./conf/certs/keystore.p12|' /opt/nifi/nifi-current/conf/nifi.properties
            sed -i 's|nifi.security.truststore=.*|nifi.security.truststore=./conf/certs/truststore.p12|' /opt/nifi/nifi-current/conf/nifi.properties
            sed -i 's|nifi.security.keystorePasswd=.*|nifi.security.keystorePasswd=th1s1s3up34e5r37|' /opt/nifi/nifi-current/conf/nifi.properties
            sed -i 's|nifi.security.truststorePasswd=.*|nifi.security.truststorePasswd=th1s1s3up34e5r37|' /opt/nifi/nifi-current/conf/nifi.properties
            sed -i 's|nifi.security.keyPasswd=.*|nifi.security.keyPasswd=th1s1s3up34e5r37|' /opt/nifi/nifi-current/conf/nifi.properties
            # Disable SNI check — start.sh has no env var for this property
            if grep -q "nifi.web.https.sni.host.check" /opt/nifi/nifi-current/conf/nifi.properties; then
              sed -i 's|nifi.web.https.sni.host.check=.*|nifi.web.https.sni.host.check=false|' /opt/nifi/nifi-current/conf/nifi.properties
            else
              echo "nifi.web.https.sni.host.check=false" >> /opt/nifi/nifi-current/conf/nifi.properties
            fi
            # Force fresh user/authorization state so single-user credentials are always applied
            rm -f /opt/nifi/nifi-current/conf/users.xml /opt/nifi/nifi-current/conf/authorizations.xml
            /opt/nifi/scripts/start.sh
        ports:
        - containerPort: 11443
          name: cluster
        - containerPort: 8443
          name: https
        - containerPort: 6342
          name: cluster-lb
        env:
          - name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: NIFI_WEB_HTTPS_HOST
            value: $(POD_NAME).nifi.$(POD_NAMESPACE).svc.cluster.local
          - name: NIFI_CLUSTER_LOAD_BALANCE_HOST
            value: $(POD_IP)
          - name: NIFI_REMOTE_INPUT_HOST
            value: $(POD_IP)
          - name: HOSTNAME
            value: $(POD_NAME).nifi.$(POD_NAMESPACE).svc.cluster.local
        envFrom:
          - configMapRef:
              name: nifi-cm
              optional: false
        volumeMounts:
          - name: data
            mountPath: /opt/nifi/nifi-current/data
            subPath: data
            readOnly: false
          - name: certs
            mountPath: /opt/nifi/nifi-current/conf/certs
            readOnly: false
          - name: scripts
            mountPath: /scripts/security.sh
            subPath: security.sh
            readOnly: false
          - name: state-management
            mountPath: /opt/nifi/nifi-current/conf/state-management.xml
            subPath: state-management.xml
            readOnly: true
          - name: authorizers
            mountPath: /opt/nifi/nifi-current/conf/authorizers.xml
            subPath: authorizers.xml
            readOnly: true
        livenessProbe:
          exec:
            command:
              - pgrep
              - java
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 20
          failureThreshold: 10
          successThreshold: 1
        readinessProbe:
          tcpSocket:
            port: cluster
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 3
          successThreshold: 1
        resources:
          requests:
            cpu: 2
            memory: 4Gi
          limits:
            cpu: 2
            memory: 4Gi
        securityContext:
          allowPrivilegeEscalation: false
          privileged: false
          capabilities:
            drop:
              - ALL
      volumes:
        - name: data
          emptyDir:
            sizeLimit: 3Gi
        - name: certs
          persistentVolumeClaim:
            claimName: nifi-shared-certs
        - name: scripts
          configMap:
            name: nifi-ssl-cm
            optional: false
            defaultMode: 0755
        - name: state-management
          configMap:
            name: nifi-state-mgmt-cm
            optional: false
        - name: authorizers
          configMap:
            name: nifi-authorizers-cm
            optional: false
