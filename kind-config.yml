kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
  image: kindest/node:v1.35.1
  extraPortMappings:
  - containerPort: 80
    hostPort: 80
    protocol: TCP
  - containerPort: 443
    hostPort: 443
    protocol: TCP
  extraMounts:
  - hostPath: /tmp/nifi-certs
    containerPath: /data/nifi-certs
- role: worker
  image: kindest/node:v1.35.1
  extraMounts:
  - hostPath: /tmp/nifi-certs
    containerPath: /data/nifi-certs
